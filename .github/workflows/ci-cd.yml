name: OpsSage CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]
  release:
    types: [ published ]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  # Code Quality and Testing
  test:
    name: Test and Quality Checks
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [18.x, 20.x]
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0
    
    - name: Setup Node.js ${{ matrix.node-version }}
      uses: actions/setup-node@v4
      with:
        node-version: ${{ matrix.node-version }}
        cache: 'npm'
    
    - name: Install dependencies
      run: npm ci
    
    - name: Run linting
      run: npm run lint
    
    - name: Run type checking
      run: npm run type-check
    
    - name: Run unit tests
      run: npm run test:unit
    
    - name: Run integration tests
      run: npm run test:integration
      env:
        NODE_ENV: test
        DATABASE_URL: postgresql://test:test@localhost:5432/opssage_test
        REDIS_URL: redis://localhost:6379
    
    - name: Generate coverage report
      run: npm run test:coverage
    
    - name: Upload coverage to Codecov
      uses: codecov/codecov-action@v3
      with:
        file: ./coverage/lcov.info
        flags: unittests
        name: codecov-umbrella
    
    - name: Run security audit
      run: npm audit --audit-level=moderate
    
    - name: Run SAST scan
      uses: github/super-linter@v4
      env:
        DEFAULT_BRANCH: main
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        VALIDATE_TYPESCRIPT_ES: true
        VALIDATE_JAVASCRIPT_ES: true
        VALIDATE_YAML: true
        VALIDATE_JSON: true

  # Security Scanning
  security:
    name: Security Scanning
    runs-on: ubuntu-latest
    needs: test
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Run Trivy vulnerability scanner
      uses: aquasecurity/trivy-action@master
      with:
        scan-type: 'fs'
        scan-ref: '.'
        format: 'sarif'
        output: 'trivy-results.sarif'
    
    - name: Upload Trivy scan results to GitHub Security tab
      uses: github/codeql-action/upload-sarif@v2
      with:
        sarif_file: 'trivy-results.sarif'
    
    - name: Run npm audit for security vulnerabilities
      run: |
        npm audit --audit-level=moderate --json > npm-audit.json || true
        cat npm-audit.json
    
    - name: Check for secrets
      uses: trufflesecurity/trufflehog@main
      with:
        path: ./
        base: main
        head: HEAD

  # Build Docker Images
  build:
    name: Build Docker Images
    runs-on: ubuntu-latest
    needs: [test, security]
    if: github.event_name != 'pull_request'
    
    strategy:
      matrix:
        service: [api-gateway, incident-analysis, data-collection, ai-engine]
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3
    
    - name: Log in to Container Registry
      uses: docker/login-action@v3
      with:
        registry: ${{ env.REGISTRY }}
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
    
    - name: Extract metadata
      id: meta
      uses: docker/metadata-action@v5
      with:
        images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/${{ matrix.service }}
        tags: |
          type=ref,event=branch
          type=ref,event=pr
          type=semver,pattern={{version}}
          type=semver,pattern={{major}}.{{minor}}
          type=sha,prefix={{branch}}-
    
    - name: Build and push Docker image
      uses: docker/build-push-action@v5
      with:
        context: .
        file: ./services/${{ matrix.service }}/Dockerfile
        push: true
        tags: ${{ steps.meta.outputs.tags }}
        labels: ${{ steps.meta.outputs.labels }}
        cache-from: type=gha
        cache-to: type=gha,mode=max
        platforms: linux/amd64,linux/arm64
    
    - name: Generate SBOM
      uses: anchore/sbom-action@v0
      with:
        image: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/${{ matrix.service }}:${{ steps.meta.outputs.version }}
        format: spdx-json
        output-file: sbom-${{ matrix.service }}.spdx.json
    
    - name: Upload SBOM
      uses: actions/upload-artifact@v3
      with:
        name: sbom-${{ matrix.service }}
        path: sbom-${{ matrix.service }}.spdx.json

  # Deploy to Staging
  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/develop'
    environment: staging
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Setup kubectl
      uses: azure/setup-kubectl@v3
      with:
        version: 'v1.28.0'
    
    - name: Configure kubectl
      run: |
        echo "${{ secrets.KUBE_CONFIG_STAGING }}" | base64 -d > kubeconfig
        export KUBECONFIG=kubeconfig
    
    - name: Deploy to staging with Helm
      run: |
        helm upgrade --install opssage-staging ./deployment/helm \
          --namespace opssage-staging \
          --create-namespace \
          --set global.env.NODE_ENV=staging \
          --set image.tag=develop-${{ github.sha }} \
          --set ingress.hosts[0].host=staging-api.opssage.io \
          --set ingress.tls[0].hosts[0]=staging-api.opssage.io \
          --set ingress.tls[0].secretName=opssage-staging-tls \
          --wait \
          --timeout=10m
    
    - name: Run smoke tests
      run: |
        npm run test:smoke -- --base-url=https://staging-api.opssage.io
      env:
        SMOKE_TEST_URL: https://staging-api.opssage.io
    
    - name: Run integration tests against staging
      run: |
        npm run test:integration:staging
      env:
        API_BASE_URL: https://staging-api.opssage.io
        NODE_ENV: staging

  # Deploy to Production
  deploy-production:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'release'
    environment: production
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Setup kubectl
      uses: azure/setup-kubectl@v3
      with:
        version: 'v1.28.0'
    
    - name: Configure kubectl
      run: |
        echo "${{ secrets.KUBE_CONFIG_PRODUCTION }}" | base64 -d > kubeconfig
        export KUBECONFIG=kubeconfig
    
    - name: Deploy to production with Helm
      run: |
        helm upgrade --install opssage ./deployment/helm \
          --namespace opssage \
          --create-namespace \
          --set global.env.NODE_ENV=production \
          --set image.tag=${{ github.event.release.tag_name }} \
          --set ingress.hosts[0].host=api.opssage.io \
          --set ingress.tls[0].hosts[0]=api.opssage.io \
          --set ingress.tls[0].secretName=opssage-tls \
          --wait \
          --timeout=15m
    
    - name: Run production smoke tests
      run: |
        npm run test:smoke -- --base-url=https://api.opssage.io
      env:
        SMOKE_TEST_URL: https://api.opssage.io
    
    - name: Verify deployment health
      run: |
        kubectl wait --for=condition=ready pod -l app.kubernetes.io/name=opssage -n opssage --timeout=300s
        kubectl get pods -n opssage
        kubectl get services -n opssage
        kubectl get ingress -n opssage
    
    - name: Run load tests
      run: |
        npm run test:load -- --target=https://api.opssage.io --duration=300
      env:
        LOAD_TEST_TARGET: https://api.opssage.io

  # Performance Testing
  performance:
    name: Performance Testing
    runs-on: ubuntu-latest
    needs: deploy-staging
    if: github.ref == 'refs/heads/develop'
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20.x'
        cache: 'npm'
    
    - name: Install dependencies
      run: npm ci
    
    - name: Run performance tests
      run: |
        npm run test:performance -- --target=https://staging-api.opssage.io
      env:
        PERFORMANCE_TEST_TARGET: https://staging-api.opssage.io
    
    - name: Upload performance results
      uses: actions/upload-artifact@v3
      with:
        name: performance-results
        path: performance-results/
    
    - name: Comment PR with performance results
      uses: actions/github-script@v6
      if: github.event_name == 'pull_request'
      with:
        script: |
          const fs = require('fs');
          const results = JSON.parse(fs.readFileSync('performance-results/summary.json', 'utf8'));
          
          const comment = `
          ## Performance Test Results
          
          - **Response Time**: ${results.avgResponseTime}ms
          - **Throughput**: ${results.throughput} req/s
          - **Error Rate**: ${results.errorRate}%
          - **95th Percentile**: ${results.p95ResponseTime}ms
          
          ${results.passed ? '✅ Performance tests passed' : '❌ Performance tests failed'}
          `;
          
          github.rest.issues.createComment({
            issue_number: context.issue.number,
            owner: context.repo.owner,
            repo: context.repo.repo,
            body: comment
          });

  # Database Migrations
  migrate:
    name: Database Migrations
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop'
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20.x'
        cache: 'npm'
    
    - name: Install dependencies
      run: npm ci
    
    - name: Run database migrations (staging)
      if: github.ref == 'refs/heads/develop'
      run: |
        npm run migrate:staging
      env:
        DATABASE_URL: ${{ secrets.DATABASE_URL_STAGING }}
    
    - name: Run database migrations (production)
      if: github.ref == 'refs/heads/main'
      run: |
        npm run migrate:production
      env:
        DATABASE_URL: ${{ secrets.DATABASE_URL_PRODUCTION }}

  # Notification
  notify:
    name: Notify Teams
    runs-on: ubuntu-latest
    needs: [deploy-staging, deploy-production]
    if: always()
    
    steps:
    - name: Notify Slack on success
      if: needs.deploy-staging.result == 'success' || needs.deploy-production.result == 'success'
      uses: 8398a7/action-slack@v3
      with:
        status: success
        channel: '#deployments'
        text: |
          🚀 Deployment successful!
          
          **Branch**: ${{ github.ref }}
          **Commit**: ${{ github.sha }}
          **Environment**: ${{ github.ref == 'refs/heads/develop' && 'Staging' || 'Production' }}
      env:
        SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
    
    - name: Notify Slack on failure
      if: needs.deploy-staging.result == 'failure' || needs.deploy-production.result == 'failure'
      uses: 8398a7/action-slack@v3
      with:
        status: failure
        channel: '#deployments'
        text: |
          ❌ Deployment failed!
          
          **Branch**: ${{ github.ref }}
          **Commit**: ${{ github.sha }}
          **Environment**: ${{ github.ref == 'refs/heads/develop' && 'Staging' || 'Production' }}
          **Workflow**: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
      env:
        SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}

  # Cleanup
  cleanup:
    name: Cleanup Resources
    runs-on: ubuntu-latest
    needs: [deploy-staging, deploy-production]
    if: always()
    
    steps:
    - name: Cleanup old Docker images
      run: |
        echo "Cleaning up old Docker images..."
        # Add cleanup logic here
    
    - name: Cleanup old deployments
      run: |
        echo "Cleaning up old deployments..."
        # Add deployment cleanup logic here
